<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка медиа без ограничений</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .upload-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 22px;
        }
        p {
            font-size: 14px;
            color: #7f8c8d;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2);
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            box-shadow: none;
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        .success { color: #27ae60; }
        .error { color: #c0392b; }
    </style>

    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
</head>
<body>

<div class="upload-container">
    <h2>Загрузка фото и видео</h2>
    <p>Вы можете загрузить любые фотографии и тяжелые видеоролики в оригинальном качестве без ограничений по размеру.</p>
    
    <button id="picker-btn" class="btn" disabled onclick="handleAuthClick()">Выбрать и загрузить файлы</button>
    
    <div id="status">Загрузка модулей Google...</div>
</div>

<script>
    // Твои конфигурационные данные из Google Cloud
    const API_KEY = 'AIzaSyBnQ0_akQUyhcjCFDpW6J9MF-Fg2qVhexE';
    const CLIENT_ID = '848812135939-clhf1th7u72mu9u10pe2vu3r518m9s07.apps.googleusercontent.com';
    const FOLDER_ID = '1irxVmfUx1yxvtAzmKijeon0cNtBdNSF6';

    // Области доступа: разрешаем загрузку файлов в Диск
    const SCOPES = 'https://www.googleapis.com/auth/drive.file';

    let tokenClient;
    let accessToken = null;

    // Инициализация при загрузке страницы
    function gapiLoaded() {
        gapi.load('client:picker', initializePicker);
    }

    function initializePicker() {
        document.getElementById('status').innerText = 'Модули готовы. Инициализация авторизации...';
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: '', // обрабатывается динамически ниже
        });
        
        // Включаем кнопку загрузки
        const btn = document.getElementById('picker-btn');
        btn.disabled = false;
        document.getElementById('status').innerText = '';
    }

    // Хэндлер нажатия на кнопку
    function handleAuthClick() {
        tokenClient.callback = async (response) => {
            if (response.error !== undefined) {
                document.getElementById('status').innerHTML = `<span class="error">Ошибка авторизации: ${response.error}</span>`;
                return;
            }
            accessToken = response.access_token;
            createPicker();
        };

        // Запрашиваем токен (если гость не авторизован, откроется окно входа в Google)
        if (accessToken === null) {
            tokenClient.requestAccessToken({ prompt: 'consent' });
        } else {
            tokenClient.requestAccessToken({ prompt: '' });
        }
    }

    // Создание и отображение Google Picker
    function createPicker() {
        // Настраиваем отображение только для загрузки файлов (DocsUploadView)
        const uploadView = new google.picker.DocsUploadView()
            .setParent(FOLDER_ID); // Указываем твою целевую папку свадьбы

        const picker = new google.picker.PickerBuilder()
            .addView(uploadView)
            .setOAuthToken(accessToken)
            .setDeveloperKey(API_KEY)
            .setCallback(pickerCallback)
            .setTitle('Загрузка файлов в свадебный альбом')
            .build();
            
        picker.setVisible(true);
    }

    // Колбэк, который срабатывает при действиях в окне Пикера
    function pickerCallback(data) {
        const statusDiv = document.getElementById('status');
        
        if (data.action === google.picker.Action.PICKED) {
            const documents = data[google.picker.Response.DOCUMENTS];
            const count = documents.length;
            
            statusDiv.innerHTML = `<span class="success">🎉 Успешно загружено файлов: ${count} шт.!</span>`;
            console.log('Загруженные файлы:', documents);
            
            // Здесь при необходимости можно сделать fetch к твоему Web App, 
            // чтобы просто передать массив имен файлов для записи в таблицу.
        } else if (data.action === google.picker.Action.CANCEL) {
            statusDiv.innerText = 'Загрузка отменена.';
        }
    }

    // Запускаем загрузку скриптов Google при старте страницы
    window.onload = function () {
        gapiLoaded();
    };
</script>

</body>
</html>
