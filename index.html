<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Екатерина & Максим | Приглашение</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            color: #2e241f;
            background: linear-gradient(135deg, #fef7f0 0%, #f9efe5 100%);
            padding: 24px 16px;
            min-height: 100vh;
        }
        #petals-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            overflow: hidden;
            position: relative;
            z-index: 1;
            box-shadow: 0 0 0 2px rgba(230,177,126,0.2), 0 0 0 6px rgba(245,210,160,0.1), 0 0 0 12px rgba(245,210,160,0.05), 0 25px 45px rgba(0,0,0,0.1);
        }
        .hero-image {
            width: 100%;
            display: block;
            aspect-ratio: 1/1;
            object-fit: cover;
        }
        .hero-overlay {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
            padding: 32px 24px;
            text-align: center;
            pointer-events: none;
        }
        .date-badge {
            display: inline-block;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            padding: 12px 32px;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(230,177,126,0.4);
            pointer-events: auto;
        }
        .date-badge:hover { background: rgba(255,255,255,0.95); transform: scale(1.02); border-color: #e6b17e; }
        .timer-section {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(4px);
            padding: 32px 20px;
            text-align: center;
            border-bottom: 1px solid #e6d5c4;
        }
        .timer-title { font-size: 1.2rem; font-weight: 500; color: #b46f3a; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
        .timer { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .timer-block {
            background: rgba(255,250,245,0.8);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 16px 20px;
            min-width: 90px;
            border: 1px solid rgba(230,177,126,0.2);
            transition: transform 0.3s;
        }
        .timer-block:hover { transform: translateY(-4px); border-color: #e6b17e; }
        .timer-number { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 700; color: #3b2a23; line-height: 1; }
        .timer-label { font-size: 0.75rem; text-transform: uppercase; color: #8f6e55; margin-top: 8px; }
        .content { padding: 32px 28px; }
        .section { margin-bottom: 36px; }
        .section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 500;
            color: #3b2a23;
            border-left: 4px solid #e6b17e;
            padding-left: 16px;
            margin-bottom: 24px;
        }
        .details-card {
            background: rgba(254,250,245,0.7);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .info-block {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(255,255,255,0.6);
            border-radius: 40px;
            padding: 16px 20px;
            border: 1px solid rgba(230,177,126,0.2);
        }
        .info-icon { font-size: 1.8rem; width: 48px; text-align: center; }
        .info-content { flex: 1; font-size: 1rem; }
        .dresscode-text {
            background: rgba(230,177,126,0.1);
            display: inline-block;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.9rem;
            color: #b46f3a;
            margin-top: 6px;
        }
        .wish-text {
            background: rgba(230,177,126,0.05);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.95rem;
            color: #5e3e2c;
            font-weight: 500;
            line-height: 1.4;
        }
        .map-link {
            display: inline-flex;
            gap: 8px;
            background: rgba(230,177,126,0.2);
            padding: 6px 16px;
            border-radius: 40px;
            text-decoration: none;
            color: #b46f3a;
            font-size: 0.9rem;
            margin-top: 8px;
        }
        .attendance-buttons { display: flex; gap: 16px; margin: 20px 0; flex-wrap: wrap; justify-content: center; }
        .attendance-btn {
            flex: 1; min-width: 160px; text-align: center; padding: 14px 20px; border-radius: 60px;
            background: rgba(245,237,229,0.8); cursor: pointer; border: 1px solid rgba(226,212,202,0.6); transition: all 0.2s;
        }
        .attendance-btn.selected { background: #e6b17e; color: white; border-color: #e6b17e; }
        
        .form-group { margin-bottom: 24px; }
        label { display: block; font-weight: 500; margin-bottom: 8px; }
        input {
            width: 100%; padding: 14px 18px; border: 1px solid #e2d4ca; border-radius: 60px;
            font-family: 'Montserrat', sans-serif; font-size: 1rem; background: rgba(255,255,255,0.8);
        }
        input:focus { outline: none; border-color: #e6b17e; box-shadow: 0 0 0 3px rgba(230,177,126,0.2); background: white; }
        
        button[type="submit"] {
            background: #e6b17e; color: white; border: none; padding: 14px 28px; border-radius: 60px;
            font-size: 1.1rem; font-weight: 600; width: 100%; cursor: pointer; transition: all 0.2s;
        }
        button[type="submit"]:disabled { background: #ccc; cursor: not-allowed; }

        .footer { background: rgba(250,245,237,0.8); text-align: center; padding: 20px 24px; font-size: 0.85rem; color: #8f6e55; border-top: 1px solid #e6d5c4; }
        
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #2b7a4b; color: white; padding: 16px 32px; border-radius: 60px;
            font-family: 'Montserrat', sans-serif; font-weight: 500; z-index: 1000;
            opacity: 0; visibility: hidden; transition: all 0.3s; pointer-events: none; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .toast.error { background: #c95a49; }
        .toast.show { opacity: 1; visibility: visible; bottom: 50px; }

        @media (max-width: 550px) {
            .hero-image { aspect-ratio: 1/1; }
            .content { padding: 24px 20px; }
            .timer-block { padding: 12px 16px; min-width: 70px; }
            .timer-number { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <canvas id="petals-canvas"></canvas>
    <div class="container">
        <div style="position: relative;">
            <img class="hero-image" src="images/verh.jpeg" alt="Приглашение">
            <div class="hero-overlay">
                <div class="date-badge" id="calendarTrigger">📅 25 июня 2026, 16:00</div>
            </div>
        </div>

        <div class="timer-section">
            <div class="timer-title">До свадьбы осталось</div>
            <div class="timer" id="timer">
                <div class="timer-block"><span class="timer-number" id="days">00</span><div class="timer-label">дней</div></div>
                <div class="timer-block"><span class="timer-number" id="hours">00</span><div class="timer-label">часов</div></div>
                <div class="timer-block"><span class="timer-number" id="minutes">00</span><div class="timer-label">минут</div></div>
                <div class="timer-block"><span class="timer-number" id="seconds">00</span><div class="timer-label">секунд</div></div>
            </div>
        </div>

        <div class="content">
            <div class="section">
                <h2>О событии</h2>
                <div class="details-card">
                    <div class="info-block">
                        <div class="info-icon">📍</div>
                        <div class="info-content">
                            <strong>Место проведения</strong>
                            <div>Ресторан «Fazenda»<br>г. Саранск, Лямбирское ш., 10В</div>
                            <a href="https://yandex.ru/maps/-/CPVo5C3A" target="_blank" class="map-link">Открыть карту →</a>
                        </div>
                    </div>
                    <div class="info-block">
                        <div class="info-icon">👗</div>
                        <div class="info-content">
                            <strong>Дресс-код</strong>
                            <div class="dresscode-text">👔 Мужчинам — без чёрного цвета</div>
                            <div class="dresscode-text" style="margin-top: 4px;">👗 Девушкам — без белого цвета</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>Ваш ответ</h2>
                <form id="rsvp-form" action="https://script.google.com/macros/s/AKfycbzOGSRk56lJXiA12wzqHx4EfLqOR_5mfrvwvJV_dYs-e0bfsg7THvKvMf7TC8qcpafdYg/exec" method="POST" target="hidden-iframe">
                    <div class="form-group">
                        <label>🔑 Код приглашения</label>
                        <input type="text" name="code" id="code" placeholder="Введите код" required>
                    </div>
                    <div class="form-group">
                        <label>ФИО</label>
                        <input type="text" name="name" id="name" placeholder="Иванова Анна" required>
                    </div>
                    <div class="form-group">
                        <label>Сможете быть?</label>
                        <div class="attendance-buttons">
                            <div class="attendance-btn" data-value="Приду">Приду</div>
                            <div class="attendance-btn" data-value="Не смогу">Не смогу</div>
                        </div>
                        <input type="hidden" name="attending" id="attending-input" required>
                    </div>
                    <div class="form-group">
                        <label>🎵 Музыкальные пожелания</label>
                        <input type="text" name="music" id="music" placeholder="Любимая песня">
                    </div>
                    <button type="submit" id="submit-btn">Отправить ответ</button>
                </form>
            </div>
        </div>
        <div class="footer">Ждем Вас! ✨</div>
    </div>
    
    <iframe name="hidden-iframe" id="hidden-iframe" style="display:none;"></iframe>
    <div id="toast" class="toast"></div>

    <script>
        // === Настройка лепестков (упрощенно) ===
        const canvas = document.getElementById('petals-canvas');
        const ctx = canvas.getContext('2d');
        let petals = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        for(let i=0; i<30; i++) petals.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*10+5, sy: Math.random()*1+0.5});
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(230,177,126,0.3)';
            petals.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
                p.y += p.sy; if(p.y > canvas.height) p.y = -10;
            });
            requestAnimationFrame(animate);
        }
        animate();

        // === Таймер ===
        function updateTimer() {
            const diff = new Date(2026, 5, 25, 16) - new Date();
            if (diff <= 0) return;
            document.getElementById('days').innerText = Math.floor(diff/864e5);
            document.getElementById('hours').innerText = Math.floor((diff/36e5)%24);
            document.getElementById('minutes').innerText = Math.floor((diff/6e4)%60);
            document.getElementById('seconds').innerText = Math.floor((diff/1e3)%60);
        }
        setInterval(updateTimer, 1000); updateTimer();

        // === Логика формы ===
        const btns = document.querySelectorAll('.attendance-btn');
        const attendingInput = document.getElementById('attending-input');
        const submitBtn = document.getElementById('submit-btn');
        const toast = document.getElementById('toast');

        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                btns.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                attendingInput.value = btn.dataset.value;
            });
        });

        function showToast(text, isError = false) {
            toast.textContent = text;
            toast.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => toast.className = 'toast', 4000);
        }

        // КЛЮЧЕВОЙ МОМЕНТ: слушаем сообщение от скрипта
        window.addEventListener('message', function(event) {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Отправить ответ';
            
            const data = event.data;
            if (data && typeof data.success !== 'undefined') {
                if (data.success) {
                    showToast('✅ Ваш ответ успешно отправлен!');
                    document.getElementById('rsvp-form').reset();
                    btns.forEach(b => b.classList.remove('selected'));
                } else {
                    showToast('❌ Ошибка: ' + (data.error || 'попробуйте позже'), true);
                }
            }
        });

        document.getElementById('rsvp-form').addEventListener('submit', (e) => {
            if (!attendingInput.value) {
                e.preventDefault();
                showToast('Выберите вариант присутствия', true);
                return;
            }
            submitBtn.disabled = true;
            submitBtn.textContent = 'Отправка...';
        });
    </script>
</body>
</html>
